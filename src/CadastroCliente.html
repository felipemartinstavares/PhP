<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <form>
        <div class="mb-3">
            <label for="email">E-mail:</label><input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="mb-3">
            <label for="senha">Senha:</label><input type="password" placeholder="Senha" id="senha">
        </div>
        <div class="mb-3">
            <label for="confirarSenha">Confirmar senha:</label><input type="password" placeholder="Confirmar Senha" id="cofirmarSenha">
        </div>
        <button>Cadastrar</button>
    </form>
    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
